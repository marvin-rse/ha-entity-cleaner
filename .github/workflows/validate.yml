name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      # actions/checkout pinned to v4.2.2 SHA for supply-chain safety.
      # hassfest is pinned to @master per HA ecosystem convention — update when HA does.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # hacs/action is pinned to @main per HACS convention — update when HACS does.
      - uses: hacs/action@main
        with:
          category: integration

  tests:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-homeassistant-custom-component
      - name: Run tests
        run: pytest tests/ -v
