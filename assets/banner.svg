<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="60%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f2235"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0556d"/>
      <stop offset="33%" style="stop-color:#e3a93c"/>
      <stop offset="66%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="ring-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="logo-clip">
      <circle cx="160" cy="170" r="94"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="1000" y1="0" x2="1000" y2="340"/>
  </g>

  <!-- Left: Logo icon — person sweeping -->
  <circle cx="160" cy="170" r="100" fill="#0c1828"/>
  <circle cx="160" cy="170" r="100" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.35"/>
  <!-- Person + broom + sparkles, scaled from 420×420 to fit circle -->
  <!-- transform: translate(70,69) scale(0.455) maps logo coords into circle area -->
  <g clip-path="url(#logo-clip)" transform="translate(70,69) scale(0.455)">
    <!-- Broom handle -->
    <line x1="282" y1="200" x2="148" y2="308" stroke="#475569" stroke-width="16" stroke-linecap="round"/>
    <!-- Bristle head -->
    <line x1="116" y1="272" x2="180" y2="344" stroke="#38bdf8" stroke-width="44" stroke-linecap="round"/>
    <line x1="124" y1="280" x2="166" y2="330" stroke="#7dd3fc" stroke-width="9" stroke-linecap="round" opacity="0.42"/>
    <!-- Head -->
    <circle cx="302" cy="116" r="34" fill="#38bdf8"/>
    <!-- Torso -->
    <ellipse cx="286" cy="207" rx="30" ry="56" fill="#38bdf8" transform="rotate(-11 286 207)"/>
    <!-- Right arm -->
    <line x1="266" y1="180" x2="218" y2="252" stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="270" y1="258" x2="240" y2="356" stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="302" y1="258" x2="334" y2="344" stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
    <!-- Sparkle large -->
    <g transform="translate(78,162)">
      <line x1="0" y1="-21" x2="0" y2="21" stroke="#f59e0b" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="-21" y1="0" x2="21" y2="0" stroke="#f59e0b" stroke-width="6.5" stroke-linecap="round"/>
      <line x1="-12" y1="-12" x2="12" y2="12" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.60"/>
      <line x1="12" y1="-12" x2="-12" y2="12" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.60"/>
    </g>
    <!-- Sparkle medium -->
    <g transform="translate(54,232)">
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
      <line x1="-9" y1="-9" x2="9" y2="9" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.60"/>
      <line x1="9" y1="-9" x2="-9" y2="9" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.60"/>
    </g>
    <!-- Sparkle small -->
    <g transform="translate(102,290)">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.60"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.60"/>
    </g>
  </g>

  <!-- Center: Title block -->
  <text x="300" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="#f1f5f9" letter-spacing="-1.5">HA Entity Cleaner</text>
  <text x="302" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="20" fill="#64748b" letter-spacing="0.2">Find, review, and safely bulk-delete orphaned entities</text>

  <!-- Feature pills row -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="500">
    <!-- Sidebar panel pill -->
    <rect x="300" y="195" width="138" height="30" rx="15" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
    <text x="369" y="215" text-anchor="middle" fill="#38bdf8">⬛ Sidebar Panel</text>

    <!-- Smart delete pill -->
    <rect x="452" y="195" width="132" height="30" rx="15" fill="#2d1f1f" stroke="#f0556d" stroke-width="1.5" opacity="0.9"/>
    <text x="518" y="215" text-anchor="middle" fill="#f0556d">🗑 Smart Delete</text>

    <!-- Config scan pill -->
    <rect x="598" y="195" width="148" height="30" rx="15" fill="#2d2a1a" stroke="#e3a93c" stroke-width="1.5" opacity="0.9"/>
    <text x="672" y="215" text-anchor="middle" fill="#e3a93c">⚠ Config Scan</text>

    <!-- HACS pill -->
    <rect x="760" y="195" width="90" height="30" rx="15" fill="#1a2d1a" stroke="#3fb950" stroke-width="1.5" opacity="0.9"/>
    <text x="805" y="215" text-anchor="middle" fill="#3fb950">✓ HACS</text>

    <!-- Admin only pill -->
    <rect x="864" y="195" width="106" height="30" rx="15" fill="#1e1e2d" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <text x="917" y="215" text-anchor="middle" fill="#a78bfa">🔒 Admin Only</text>
  </g>

  <!-- Right: Cleanliness score ring preview -->
  <g transform="translate(1040, 170)">
    <!-- Ring background -->
    <circle cx="0" cy="0" r="68" fill="#111827" stroke="#1e293b" stroke-width="1"/>
    <!-- Ring track -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#1e293b" stroke-width="10" transform="rotate(-90)"/>
    <!-- Ring fill 74% = 264 * 0.74 = 195 -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="195 264" transform="rotate(-90)" filter="url(#glow-filter)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#38bdf8">74</text>
    <text x="0" y="14" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#64748b">Fair</text>
    <text x="0" y="90" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#94a3b8">Cleanliness Score</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="332" width="1200" height="4" fill="url(#accent-bar)" opacity="0.85"/>

  <!-- Bottom badges -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="12" fill="#475569">
    <text x="300" y="320">⭐ Cleanliness score 0–100</text>
    <text x="500" y="320">🛡 Safe-delete guards</text>
    <text x="670" y="320">📋 Export before delete</text>
    <text x="840" y="320">🔍 Config-usage check</text>
    <text x="1010" y="320">🚫 No telemetry</text>
  </g>
</svg>
