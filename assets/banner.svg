<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1424"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <radialGradient id="glow" cx="14%" cy="50%" r="46%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- App-icon tile gradients -->
    <linearGradient id="tile-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="tile-hl" cx="28%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="tile-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#glow)"/>

  <!-- Decorative oversized sparkles on the right (subtle brand motif) -->
  <g fill="#fbbf24" opacity="0.10">
    <path d="M1040,70 C1040,118 1006,152 958,152 C1006,152 1040,186 1040,234 C1040,186 1074,152 1122,152 C1074,152 1040,118 1040,70 Z"/>
  </g>
  <g fill="#38bdf8" opacity="0.10">
    <path d="M1140,180 C1140,210 1119,231 1089,231 C1119,231 1140,252 1140,282 C1140,252 1161,231 1191,231 C1161,231 1140,210 1140,180 Z"/>
  </g>

  <!-- Left: app-icon tile (logo, scaled from 420×420) -->
  <!-- maps logo center (210,210) → (140,170) at scale 0.40 -->
  <g transform="translate(56,86) scale(0.40)" filter="url(#tile-shadow)">
    <rect width="420" height="420" rx="94" fill="url(#tile-bg)"/>
    <rect width="420" height="420" rx="94" fill="url(#tile-hl)"/>
    <g transform="translate(60,52) scale(13)">
      <path fill="#ffffff" d="M19.36,2.72L20.78,4.14L15.06,9.85C16.13,11.39 16.28,13.24 15.38,14.44L9.06,8.12C10.26,7.22 12.11,7.37 13.65,8.44L19.36,2.72M5.93,17.57C3.92,15.56 2.69,13.16 2.35,10.92L7.23,8.83L14.67,16.27L12.58,21.15C10.34,20.81 7.94,19.58 5.93,17.57Z"/>
    </g>
    <g fill="#fde68a">
      <path d="M115,87 C115,103 99,115 83,115 C99,115 115,127 115,143 C115,127 131,115 147,115 C131,115 115,103 115,87 Z"/>
      <path d="M165,68 C165,77 156,84 147,84 C156,84 165,91 165,100 C165,91 174,84 183,84 C174,84 165,77 165,68 Z"/>
      <path d="M92,162 C92,169 85,174 78,174 C85,174 92,179 92,186 C92,179 99,174 106,174 C99,174 92,169 92,162 Z"/>
    </g>
  </g>

  <!-- Wordmark + tagline -->
  <text x="270" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="52" font-weight="800" fill="#f8fafc" letter-spacing="-1.5">HA Entity Cleaner</text>
  <text x="272" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="19" fill="#8193ad" letter-spacing="0.2">Find, review, and safely bulk-delete orphaned entities</text>

  <!-- Uniform minimal feature chips (no emoji) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
     font-size="13.5" font-weight="600" fill="#bae6fd">
    <g>
      <rect x="272" y="222" width="126" height="32" rx="16" fill="#ffffff" fill-opacity="0.04"
            stroke="#38bdf8" stroke-opacity="0.30" stroke-width="1"/>
      <circle cx="292" cy="238" r="3" fill="#38bdf8"/>
      <text x="305" y="242.5">Sidebar panel</text>
    </g>
    <g>
      <rect x="410" y="222" width="120" height="32" rx="16" fill="#ffffff" fill-opacity="0.04"
            stroke="#38bdf8" stroke-opacity="0.30" stroke-width="1"/>
      <circle cx="430" cy="238" r="3" fill="#38bdf8"/>
      <text x="443" y="242.5">Smart delete</text>
    </g>
    <g>
      <rect x="542" y="222" width="118" height="32" rx="16" fill="#ffffff" fill-opacity="0.04"
            stroke="#38bdf8" stroke-opacity="0.30" stroke-width="1"/>
      <circle cx="562" cy="238" r="3" fill="#38bdf8"/>
      <text x="575" y="242.5">Config scan</text>
    </g>
    <g>
      <rect x="672" y="222" width="116" height="32" rx="16" fill="#ffffff" fill-opacity="0.04"
            stroke="#38bdf8" stroke-opacity="0.30" stroke-width="1"/>
      <circle cx="692" cy="238" r="3" fill="#38bdf8"/>
      <text x="705" y="242.5">Admin-only</text>
    </g>
  </g>

  <!-- Thin brand accent line -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#accent)"/>
</svg>
