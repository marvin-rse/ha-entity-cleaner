<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <!-- Background: dark, modern rounded square -->
  <rect width="420" height="420" rx="72" fill="#111827"/>

  <!-- Broom brush head — perpendicular to handle, at sweep end -->
  <!-- Handle is NE→SW at -45°; brush is NW→SE at +45°, width=32 -->
  <line x1="148" y1="222" x2="204" y2="278"
        stroke="#38bdf8" stroke-width="32" stroke-linecap="round"/>

  <!-- Broom handle — diagonal upper-right to lower-left -->
  <line x1="296" y1="128" x2="178" y2="246"
        stroke="#e2e8f0" stroke-width="16" stroke-linecap="round"/>

  <!-- Orphan entity dot — in the sweep path, about to be cleaned -->
  <circle cx="258" cy="164" r="15" fill="#fbbf24"/>

  <!-- Trail — a second entity already swept away -->
  <circle cx="290" cy="140" r="8" fill="#fbbf24" opacity="0.30"/>
</svg>
