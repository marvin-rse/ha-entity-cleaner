<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="broom-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0556d;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#e3a93c;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0ea5e9" flood-opacity="0.35"/>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="210" cy="180" r="130"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="420" height="420" fill="url(#bg)" rx="28"/>

  <!-- Outer ring decoration -->
  <circle cx="210" cy="180" r="142" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.6"/>
  <circle cx="210" cy="180" r="156" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>

  <!-- Icon background circle -->
  <circle cx="210" cy="180" r="130" fill="#0f2235" filter="url(#shadow)"/>

  <!-- Subtle inner gradient ring -->
  <circle cx="210" cy="180" r="130" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.7"/>

  <!-- Broom handle -->
  <line x1="268" y1="112" x2="152" y2="228" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <!-- Broom head base -->
  <ellipse cx="145" cy="240" rx="50" ry="20" fill="#38bdf8" transform="rotate(-45 145 240)" opacity="0.95"/>
  <!-- Broom bristles -->
  <g stroke="#0ea5e9" stroke-width="3.5" stroke-linecap="round">
    <line x1="118" y1="256" x2="100" y2="275"/>
    <line x1="128" y1="262" x2="113" y2="282"/>
    <line x1="138" y1="266" x2="126" y2="287"/>
    <line x1="149" y1="268" x2="140" y2="290"/>
    <line x1="159" y1="264" x2="154" y2="287"/>
    <line x1="169" y1="258" x2="167" y2="281"/>
    <line x1="178" y1="249" x2="179" y2="272"/>
  </g>
  <!-- Broom accent stripe -->
  <line x1="115" y1="258" x2="182" y2="244" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Floating entity pills (decorative) -->
  <!-- pill 1: orphan -->
  <rect x="244" y="140" width="78" height="24" rx="12" fill="#f0556d" opacity="0.18"/>
  <rect x="244" y="140" width="78" height="24" rx="12" fill="none" stroke="#f0556d" stroke-width="1" opacity="0.5"/>
  <text x="283" y="157" text-anchor="middle" fill="#f0556d" font-family="ui-monospace, monospace" font-size="10" opacity="0.9">sensor.old</text>

  <!-- pill 2: offline -->
  <rect x="252" y="173" width="68" height="24" rx="12" fill="#e3a93c" opacity="0.15"/>
  <rect x="252" y="173" width="68" height="24" rx="12" fill="none" stroke="#e3a93c" stroke-width="1" opacity="0.45"/>
  <text x="286" y="190" text-anchor="middle" fill="#e3a93c" font-family="ui-monospace, monospace" font-size="10" opacity="0.85">light.old</text>

  <!-- pill 3: safe/ok -->
  <rect x="248" y="206" width="82" height="24" rx="12" fill="#3fb950" opacity="0.15"/>
  <rect x="248" y="206" width="82" height="24" rx="12" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.4"/>
  <text x="289" y="223" text-anchor="middle" fill="#3fb950" font-family="ui-monospace, monospace" font-size="10" opacity="0.85">button.orphan</text>

  <!-- checkmark / delete icon top right -->
  <circle cx="278" cy="112" r="14" fill="#f0556d" opacity="0.15"/>
  <path d="M272 112 L276 116 L284 108" stroke="#f0556d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Text section -->
  <text x="210" y="343" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#f1f5f9" filter="url(#text-shadow)" letter-spacing="-0.5">HA Entity Cleaner</text>
  <text x="210" y="372" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.5">Find · Review · Safely Remove</text>

  <!-- Bottom accent bar -->
  <rect x="140" y="392" width="140" height="3" rx="1.5" fill="url(#glow)" opacity="0.7"/>
</svg>
