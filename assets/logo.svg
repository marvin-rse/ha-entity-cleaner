<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <!-- Vibrant cool gradient: sky → indigo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Soft top-left glass highlight -->
    <radialGradient id="hl" cx="28%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Broom fill: white with a faint cool tint -->
    <linearGradient id="broom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <!-- Drop shadow for depth under the broom -->
    <filter id="ds" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#1e1b4b" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="420" rx="94" fill="url(#bg)"/>
  <rect width="420" height="420" rx="94" fill="url(#hl)"/>

  <!-- Broom — based on Material Design Icons "broom" (mdi:broom),
       scaled ×13 and centered. Handle upper-right, brush lower-left. -->
  <g filter="url(#ds)" transform="translate(60,52) scale(13)">
    <path fill="url(#broom)" d="M19.36,2.72L20.78,4.14L15.06,9.85C16.13,11.39 16.28,13.24 15.38,14.44L9.06,8.12C10.26,7.22 12.11,7.37 13.65,8.44L19.36,2.72M5.93,17.57C3.92,15.56 2.69,13.16 2.35,10.92L7.23,8.83L14.67,16.27L12.58,21.15C10.34,20.81 7.94,19.58 5.93,17.57Z"/>
  </g>

  <!-- Sparkles (gold) in the swept upper-left area -->
  <g fill="#fde68a">
    <!-- large -->
    <path d="M115,87 C115,103 99,115 83,115 C99,115 115,127 115,143 C115,127 131,115 147,115 C131,115 115,103 115,87 Z"/>
    <!-- medium -->
    <path d="M165,68 C165,77 156,84 147,84 C156,84 165,91 165,100 C165,91 174,84 183,84 C174,84 165,77 165,68 Z"/>
    <!-- small -->
    <path d="M92,162 C92,169 85,174 78,174 C85,174 92,179 92,186 C92,179 99,174 106,174 C99,174 92,169 92,162 Z"/>
  </g>
</svg>
