<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="420" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#0c1828"/>
    </linearGradient>
    <radialGradient id="hl" cx="28%" cy="22%" r="54%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: deep navy rounded square -->
  <rect width="420" height="420" rx="80" fill="url(#bg)"/>
  <!-- Subtle glass highlight top-left -->
  <rect width="420" height="420" rx="80" fill="url(#hl)"/>

  <!-- ── BROOM ── -->
  <!-- Handle (behind figure arm) -->
  <line x1="282" y1="200" x2="148" y2="308"
        stroke="#475569" stroke-width="16" stroke-linecap="round"/>
  <!-- Bristle head (perpendicular to handle, at working end) -->
  <!-- Handle dir: (-134,108) → unit(-0.779,0.628) → perp CW (0.628,0.779) -->
  <!-- Center (148,308), ±30: A=(129,285) B=(167,331) -->
  <line x1="116" y1="272" x2="180" y2="344"
        stroke="#38bdf8" stroke-width="44" stroke-linecap="round"/>
  <!-- Bristle sheen -->
  <line x1="124" y1="280" x2="166" y2="330"
        stroke="#7dd3fc" stroke-width="9" stroke-linecap="round" opacity="0.42"/>

  <!-- ── FIGURE ── -->
  <!-- Head -->
  <circle cx="302" cy="116" r="34" fill="#38bdf8"/>
  <!-- Body / torso (slight forward lean) -->
  <ellipse cx="286" cy="207" rx="30" ry="56" fill="#38bdf8"
           transform="rotate(-11 286 207)"/>
  <!-- Right arm (sweeping forward-left, connects to broom handle) -->
  <line x1="266" y1="180" x2="218" y2="252"
        stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
  <!-- Left leg (forward stride) -->
  <line x1="270" y1="258" x2="240" y2="356"
        stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>
  <!-- Right leg (back, stepping away) -->
  <line x1="302" y1="258" x2="334" y2="344"
        stroke="#38bdf8" stroke-width="24" stroke-linecap="round"/>

  <!-- ── SPARKLE STARS (gold — in the swept area) ── -->
  <!-- Large (upper-left swept area) -->
  <g transform="translate(78, 162)">
    <line x1="0" y1="-21" x2="0" y2="21" stroke="#f59e0b" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="-21" y1="0" x2="21" y2="0" stroke="#f59e0b" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.60"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round" opacity="0.60"/>
  </g>
  <!-- Medium (middle-left) -->
  <g transform="translate(54, 232)">
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.60"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.60"/>
  </g>
  <!-- Small (near broom tip) -->
  <g transform="translate(102, 290)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.60"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.60"/>
  </g>
</svg>
