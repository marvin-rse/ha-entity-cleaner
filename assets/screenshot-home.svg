<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" width="1280" height="780">
  <defs>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="score-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- HA Window Chrome -->
  <rect width="1280" height="780" fill="#111827"/>

  <!-- Window title bar -->
  <rect width="1280" height="38" fill="#0f172a"/>
  <circle cx="18" cy="19" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="19" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="58" cy="19" r="7" fill="#22c55e" opacity="0.8"/>
  <text x="640" y="25" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">Home Assistant — HA Entity Cleaner</text>

  <!-- HA Sidebar -->
  <rect x="0" y="38" width="72" height="742" fill="url(#sidebar-grad)"/>

  <!-- Sidebar icons (HA-style) -->
  <g fill="#4b5563" font-size="20">
    <!-- Home icon -->
    <rect x="20" y="62" width="32" height="32" rx="8" fill="#1e293b"/>
    <text x="36" y="83" text-anchor="middle" fill="#94a3b8" font-size="16">⌂</text>
    <!-- Lovelace -->
    <rect x="20" y="106" width="32" height="32" rx="8" fill="#1e293b"/>
    <text x="36" y="127" text-anchor="middle" fill="#64748b" font-size="16">◈</text>
    <!-- History -->
    <rect x="20" y="150" width="32" height="32" rx="8" fill="#1e293b"/>
    <text x="36" y="171" text-anchor="middle" fill="#64748b" font-size="14">⏱</text>
    <!-- Dev tools -->
    <rect x="20" y="194" width="32" height="32" rx="8" fill="#1e293b"/>
    <text x="36" y="215" text-anchor="middle" fill="#64748b" font-size="14">⚙</text>
    <!-- Entity Cleaner (active) -->
    <rect x="16" y="246" width="40" height="40" rx="10" fill="#1e3a5f"/>
    <rect x="15" y="246" width="3" height="40" rx="1.5" fill="#38bdf8"/>
    <text x="36" y="272" text-anchor="middle" fill="#38bdf8" font-size="18">🧹</text>
  </g>

  <!-- Main content area -->
  <rect x="72" y="38" width="1208" height="742" fill="#111827"/>

  <!-- Top header bar -->
  <rect x="72" y="38" width="1208" height="56" fill="#0f172a" opacity="0.8"/>
  <text x="100" y="73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="600" fill="#f1f5f9">🧹 HA Entity Cleaner</text>
  <text x="340" y="73" font-family="-apple-system, sans-serif" font-size="14" fill="#475569">Find, review, and safely remove orphaned entities</text>

  <!-- Rescan button -->
  <rect x="1120" y="51" width="130" height="32" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1185" y="72" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#94a3b8">↺  Rescan</text>

  <!-- ═══════════ SCORE CARD ═══════════ -->
  <rect x="100" y="118" width="1160" height="160" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>

  <!-- Score ring -->
  <g transform="translate(230, 198)">
    <circle cx="0" cy="0" r="64" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <!-- track -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#263548" stroke-width="10" transform="rotate(-90)"/>
    <!-- 74% fill: 2π*52*0.74 = 241.8 → dasharray 242 327 -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="url(#score-ring)" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="242 327" transform="rotate(-90)" filter="url(#glow)"/>
    <text x="0" y="-7" text-anchor="middle" font-family="ui-monospace, monospace" font-size="28" font-weight="700" fill="#38bdf8">74</text>
    <text x="0" y="16" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Fair</text>
  </g>

  <!-- Score text block -->
  <text x="326" y="157" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9">Instance Cleanliness</text>
  <text x="326" y="185" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">
    <tspan fill="#f1f5f9" font-weight="600">23</tspan>
    <tspan> safe orphans ready to delete </tspan>
    <tspan>·  </tspan>
    <tspan fill="#f1f5f9" font-weight="600">5</tspan>
    <tspan> uncertain  ·  </tspan>
    <tspan fill="#f1f5f9" font-weight="600">2</tspan>
    <tspan> still referenced in config</tspan>
  </text>

  <!-- Review button -->
  <rect x="326" y="205" width="180" height="38" rx="9" fill="#0ea5e9"/>
  <text x="416" y="229" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff">Review &amp; Clean →</text>

  <!-- ═══════════ COUNTER CARDS ═══════════ -->
  <!-- Orphan card -->
  <rect x="100" y="298" width="278" height="120" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>
  <rect x="100" y="298" width="4" height="120" rx="2" fill="#ef4444"/>
  <text x="130" y="332" font-family="ui-monospace, monospace" font-size="38" font-weight="700" fill="#ef4444">28</text>
  <text x="130" y="362" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Orphans</text>
  <text x="130" y="382" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Deletable</text>
  <text x="358" y="330" font-family="-apple-system, sans-serif" font-size="24" fill="#ef4444" opacity="0.35">◈</text>

  <!-- Offline card -->
  <rect x="394" y="298" width="278" height="120" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>
  <rect x="394" y="298" width="4" height="120" rx="2" fill="#f59e0b"/>
  <text x="424" y="332" font-family="ui-monospace, monospace" font-size="38" font-weight="700" fill="#f59e0b">7</text>
  <text x="424" y="362" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Offline</text>
  <text x="424" y="382" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Real, keep</text>

  <!-- Disabled card -->
  <rect x="688" y="298" width="278" height="120" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>
  <rect x="688" y="298" width="4" height="120" rx="2" fill="#6b7280"/>
  <text x="718" y="332" font-family="ui-monospace, monospace" font-size="38" font-weight="700" fill="#6b7280">14</text>
  <text x="718" y="362" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Disabled</text>
  <text x="718" y="382" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Intentional</text>

  <!-- Ghost card -->
  <rect x="982" y="298" width="278" height="120" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>
  <rect x="982" y="298" width="4" height="120" rx="2" fill="#a78bfa"/>
  <text x="1012" y="332" font-family="ui-monospace, monospace" font-size="38" font-weight="700" fill="#a78bfa">2</text>
  <text x="1012" y="362" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" fill="#f1f5f9">Ghosts</text>
  <text x="1012" y="382" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b">Fix at source</text>

  <!-- ═══════════ BACKUP BANNER ═══════════ -->
  <rect x="100" y="438" width="1160" height="52" rx="11" fill="#1c1a0a" stroke="#b45309" stroke-width="1" opacity="0.9"/>
  <text x="126" y="469" font-family="-apple-system, sans-serif" font-size="14" fill="#fbbf24">⚠</text>
  <text x="152" y="469" font-family="-apple-system, sans-serif" font-size="13" fill="#d97706">
    <tspan font-weight="700">Take a backup before deleting.</tspan>
    <tspan fill="#92400e"> Deleted registry entries cannot be recovered by this tool. Use </tspan>
    <tspan font-style="italic">Export JSON</tspan>
    <tspan> to save a record of your selection first.</tspan>
  </text>

  <!-- ═══════════ DOMAIN BREAKDOWN ═══════════ -->
  <rect x="100" y="510" width="1160" height="234" rx="14" fill="#1e293b" stroke="#263548" stroke-width="1"/>
  <text x="128" y="542" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#475569" letter-spacing="0.8">ORPHAN BREAKDOWN BY DOMAIN</text>

  <!-- Bar rows -->
  <g font-family="ui-monospace, monospace" font-size="13">
    <!-- button: 22 -->
    <text x="128" y="578" fill="#94a3b8">button</text>
    <rect x="240" y="563" width="800" height="10" rx="5" fill="#1a2535"/>
    <rect x="240" y="563" width="628" height="10" rx="5" fill="#38bdf8" opacity="0.7"/>
    <text x="1055" y="578" fill="#64748b">22</text>

    <!-- sensor: 4 -->
    <text x="128" y="614" fill="#94a3b8">sensor</text>
    <rect x="240" y="599" width="800" height="10" rx="5" fill="#1a2535"/>
    <rect x="240" y="599" width="114" height="10" rx="5" fill="#38bdf8" opacity="0.7"/>
    <text x="1055" y="614" fill="#64748b">4</text>

    <!-- binary_sensor: 1 -->
    <text x="128" y="650" fill="#94a3b8">binary_sensor</text>
    <rect x="240" y="635" width="800" height="10" rx="5" fill="#1a2535"/>
    <rect x="240" y="635" width="28" height="10" rx="5" fill="#38bdf8" opacity="0.7"/>
    <text x="1055" y="650" fill="#64748b">1</text>

    <!-- light: 1 -->
    <text x="128" y="686" fill="#94a3b8">light</text>
    <rect x="240" y="671" width="800" height="10" rx="5" fill="#1a2535"/>
    <rect x="240" y="671" width="28" height="10" rx="5" fill="#38bdf8" opacity="0.7"/>
    <text x="1055" y="686" fill="#64748b">1</text>
  </g>

  <!-- Bottom label -->
  <text x="128" y="728" font-family="-apple-system, sans-serif" font-size="12" fill="#374151">…and 0 more domains</text>
</svg>
