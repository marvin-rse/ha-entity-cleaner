      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Window + chrome -->
  <rect width="1280" height="860" fill="#111827"/>
  <rect width="1280" height="38" fill="#0f172a"/>
  <circle cx="18" cy="19" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="38" cy="19" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="58" cy="19" r="7" fill="#22c55e" opacity="0.8"/>
  <text x="640" y="25" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#64748b">Home Assistant — HA Entity Cleaner</text>

  <!-- Sidebar -->
