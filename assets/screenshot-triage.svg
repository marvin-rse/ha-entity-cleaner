  <text x="126" y="631" font-family="-apple-system, sans-serif" font-size="14" fill="#64748b">▶</text>
  <text x="152" y="631" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#f1f5f9">light</text>
  <text x="980" y="631" font-family="-apple-system, sans-serif" font-size="12" fill="#0ea5e9">Select all</text>
  <text x="1220" y="631" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#64748b">1</text>

  <!-- ═══════════ STICKY ACTION BAR ═══════════ -->
