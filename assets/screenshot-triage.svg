  <text x="157" y="132" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#38bdf8">28</text>
  <line x1="100" y1="140" x2="220" y2="140" stroke="#38bdf8" stroke-width="2"/>

